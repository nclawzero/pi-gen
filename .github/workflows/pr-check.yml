name: PR check (shellcheck + bash -n)

on:
  pull_request:
    branches: [master, main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: shellcheck
        run: find . -type f -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning --exclude=SC2010
      - name: bash -n syntax check
        run: find . -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
